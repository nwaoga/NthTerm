name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build

      - name: Run CI tests
        run: npm run test:ci

  windows-release:
    name: Windows release artifacts
    runs-on: windows-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned Windows artifacts
        # Intentionally unsigned: no CSC_LINK / certificate secrets required.
        run: npm run release:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nthterm-windows-unsigned
          path: |
            release/*.exe
            release/*.zip
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

  macos-release:
    name: macOS release artifacts
    runs-on: macos-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npm run electron:rebuild

      - name: Build unsigned macOS artifacts
        # Intentionally unsigned: identity is null and no Apple notarization secrets are required.
        run: npm run release:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nthterm-macos-unsigned
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14
