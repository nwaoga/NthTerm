name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build

      - name: Run CI tests
        run: npm run test:ci

  windows-release:
    name: Windows release artifacts
    runs-on: windows-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned Windows artifacts
        run: npm run release:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nthterm-windows-unsigned
          path: |
            release/*.exe
            release/*.zip
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14
