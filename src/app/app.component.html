<main class="app-shell">
  <app-left-rail
    [preferencesOpen]="preferencesOpen"
    [utilityPanelVisible]="utilityPanelVisible"
    (preferencesToggle)="togglePreferences()"
    (utilityPanelPreferenceChange)="setUtilityPanelPreference($event)"
    (workspaceSelected)="onWorkspaceSelected($event)"
    (templateSelected)="onTemplateSelected($event)"
    (sessionRenameCommitted)="onSessionRenameCommitted($event)"
    (sessionDeleteRequested)="onSessionDeleteRequested($event)"
  />

  <section class="workspace-shell" [class.utility-dock-visible]="utilityPanelVisible">
    <app-shell-toolbar
      [viewMenuOpen]="viewMenuOpen"
      (createTabRequested)="onCreateTab()"
      (layoutModeChange)="onLayoutModeChange($event)"
      (globalSearchRequested)="openGlobalSearch()"
      (commandPaletteRequested)="openCommandPalette()"
      (utilityPanelOpen)="openUtilityPanel($event)"
      (viewMenuToggle)="toggleViewMenu($event)"
    />

    <app-workspace-area />

    @if (utilityPanelVisible) {
      <app-bottom-dock (utilityTabChange)="onUtilityTabChange($event)" />
    }

    <app-status-bar />
  </section>

  <app-command-palette />
</main>
