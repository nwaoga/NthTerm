<main class="app-shell">
  <app-shell-toolbar
    class="app-shell-toolbar-host"
    (createTabRequested)="onCreateTab()"
    (createTerminalRequested)="onCreateTerminal($event)"
    (layoutModeChange)="onLayoutModeChange($event)"
    (commandPaletteRequested)="openCommandPalette()"
    (settingsRequested)="openSettings()"
  />

  <app-left-rail
    class="app-left-rail-host"
    (newSessionRequested)="onNewSessionRequested()"
    (workspaceSelected)="onWorkspaceSelected($event)"
    (workspaceRenameCommitted)="onWorkspaceRenameCommitted($event)"
    (workspaceDeleteRequested)="onWorkspaceDeleteRequested($event)"
  />

  <section
    class="workspace-shell"
    [class.utility-dock-visible]="utilityPanelVisible"
    [class.workspace-shell-dock-resizing]="dockResizeActive"
    [style.--dock-height.px]="utilityPanelHeight"
  >
    <app-workspace-area />

    @if (utilityPanelVisible) {
      <div
        class="dock-resize-handle"
        role="separator"
        aria-orientation="horizontal"
        aria-label="Resize workspace dock"
        (mousedown)="startUtilityPanelResize($event)"
      ></div>
      <app-bottom-dock #bottomDock (utilityTabChange)="onUtilityTabChange($event)" />
    }

    <app-status-bar />
  </section>

  <app-command-palette />

  <app-settings-modal
    [open]="settingsOpen"
    [utilityPanelVisible]="utilityPanelVisible"
    [newSessionStartMode]="newSessionStartMode"
    [newSessionCustomPath]="newSessionCustomPath"
    [homeDirectory]="homeDirectory"
    [defaultShell]="defaultShell"
    [systemTheme]="systemTheme"
    [defaultTerminalForeground]="defaultTerminalForeground"
    [defaultTerminalBackground]="defaultTerminalBackground"
    [terminalAnsiPalette]="terminalAnsiPalette"
    (closed)="closeSettings()"
    (utilityPanelPreferenceChange)="setUtilityPanelPreference($event)"
    (newSessionStartModeChange)="setNewSessionStartMode($event)"
    (newSessionCustomPathChange)="setNewSessionCustomPath($event)"
    (defaultShellChange)="setDefaultShell($event)"
    (systemThemeChange)="setSystemTheme($event)"
    (defaultTerminalForegroundChange)="setDefaultTerminalForeground($event)"
    (defaultTerminalBackgroundChange)="setDefaultTerminalBackground($event)"
    (terminalAnsiPaletteChange)="setTerminalAnsiPalette($event)"
  />
</main>
