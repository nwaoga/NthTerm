<aside class="left-rail">
  <section class="rail-section">
    <div class="rail-section-header">
      <p class="rail-title">Workspaces</p>
      <button type="button" class="rail-create-button" (click)="createBlankWorkspace()">
        <span class="rail-create-icon" aria-hidden="true">
          <svg viewBox="0 0 16 16" fill="none">
            <path d="M8 3.5v9M3.5 8h9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
          </svg>
        </span>
        <span class="rail-create-label">New Workspace</span>
      </button>
    </div>
    <div class="session-list">
      @for (workspace of ws.workspaces; track trackById($index, workspace)) {
        <div
          class="session-row"
          [class.active]="isWorkspaceActive(workspace)"
          [attr.data-accent]="workspace.accent"
        >
          @if (ws.editingWorkspaceId === workspace.id) {
            <input
              class="session-rename-input"
              [(ngModel)]="ws.editingWorkspaceName"
              type="text"
              (keydown.enter)="commitRenameWorkspace(workspace.id)"
              (keydown.escape)="cancelRenameWorkspace()"
              (blur)="commitRenameWorkspace(workspace.id)"
            />
          } @else {
            <button
              type="button"
              class="session-item"
              (click)="selectWorkspace(workspace.id)"
              (dblclick)="startRenameWorkspace(workspace, $event)"
            >
              <span class="session-icon" aria-hidden="true">
                @switch (workspace.icon) {
                  @case ('cloud') {
                    <svg viewBox="0 0 20 20" fill="none">
                      <path d="M6.7 15.4h6.1a3.2 3.2 0 0 0 .5-6.4 4.4 4.4 0 0 0-8.4 1.2 2.7 2.7 0 0 0 1.8 5.2Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                  }
                  @case ('spark') {
                    <svg viewBox="0 0 20 20" fill="none">
                      <path d="m10 3.8 1.5 4.2 4.2 1.5-4.2 1.5-1.5 4.2-1.5-4.2-4.2-1.5 4.2-1.5L10 3.8Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
                    </svg>
                  }
                  @case ('cap') {
                    <svg viewBox="0 0 20 20" fill="none">
                      <path d="M3.8 8.3 10 5l6.2 3.3L10 11.6 3.8 8.3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
                      <path d="M6.4 9.7v3.2c0 .6 1.6 1.6 3.6 1.6s3.6-1 3.6-1.6V9.7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                    </svg>
                  }
                  @case ('server') {
                    <svg viewBox="0 0 20 20" fill="none">
                      <rect x="4.2" y="4.2" width="11.6" height="4.2" rx="1.2" stroke="currentColor" stroke-width="1.5" />
                      <rect x="4.2" y="11.6" width="11.6" height="4.2" rx="1.2" stroke="currentColor" stroke-width="1.5" />
                      <path d="M7 6.3h.01M7 13.7h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                  }
                  @default {
                    <svg viewBox="0 0 20 20" fill="none">
                      <circle cx="10" cy="10" r="2.2" fill="currentColor" />
                    </svg>
                  }
                }
              </span>
              <span class="session-name">{{ workspace.name }}</span>
            </button>
            <div class="session-actions">
              <button
                type="button"
                class="session-action-icon"
                title="Rename workspace"
                aria-label="Rename workspace"
                (click)="startRenameWorkspace(workspace, $event)"
              >
                <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                  <path d="m5.4 14.7 2.5-.5 6.1-6.1-2-2-6.1 6.1-.5 2.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
                  <path d="m10.8 5.6 2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                </svg>
              </button>
              <button
                type="button"
                class="session-action-icon session-action-icon-danger"
                title="Delete workspace"
                aria-label="Delete workspace"
                (click)="deleteWorkspace(workspace, $event)"
              >
                <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                  <path d="M6 6 14 14M14 6l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                </svg>
              </button>
            </div>
          }
        </div>
      }
    </div>
  </section>

  <div class="rail-status">All systems operational</div>
</aside>
