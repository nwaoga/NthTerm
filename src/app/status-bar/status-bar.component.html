<footer class="status-bar">

    <span class="dot"></span>
    <span>Connected</span>
  </div>
  <div class="status-cluster">
    <span>{{ ws.workspaceName }}</span>

  <div class="status-cluster">
    <span>Ln 12, Col 1</span>
    <span>UTF-8</span>
    <span>CRLF</span>
    <span>PowerShell</span>
  </div>
</footer>
