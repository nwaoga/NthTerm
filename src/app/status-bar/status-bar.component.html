<footer class="status-bar">
  <div class="status-cluster">
    <span class="dot"></span>
    <span>Connected</span>
  </div>
  <div class="status-cluster">

  <div class="status-cluster">

    <span>UTF-8</span>
    <span>PowerShell</span>
  </div>
</footer>
