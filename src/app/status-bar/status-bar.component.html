<footer class="status-bar">
  <div class="status-cluster">
    <span class="dot"></span>
    <span>Connected</span>
  </div>
  <div class="status-cluster">
    <span>{{ ws.workspaceName }}</span>
    <span>{{ ws.getActiveTabTerminals().length }} terminals</span>
    <span>Layout: {{ ws.layoutMode === 'grid-2x2' ? '2x2' : '2-Up' }}</span>
  </div>
  <div class="status-cluster">
    <span>Ln 12, Col 1</span>
    <span>UTF-8</span>
    <span>CRLF</span>
    <span>PowerShell</span>
  </div>
</footer>
