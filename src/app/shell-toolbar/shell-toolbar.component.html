<header
  class="shell-toolbar"
  [class.windows-titlebar]="hostPlatform === 'win32'"
  [class.mac-titlebar]="hostPlatform === 'darwin'"
>
  <div class="shell-toolbar-leading">
    @if (hostPlatform !== 'win32' && hostPlatform !== 'darwin') {
    <div class="traffic-lights" aria-hidden="true">
      <span class="traffic-light traffic-light-close"></span>
      <span class="traffic-light traffic-light-minimize"></span>
      <span class="traffic-light traffic-light-maximize"></span>
    </div>
    }

    <div class="desktop-header-leading toolbar-brand">
      <div class="desktop-app-badge">N</div>
      <div class="desktop-brand-copy">
        <span class="desktop-brand-label">Workspace Shell</span>
        <strong class="desktop-app-title">NthTerm</strong>
      </div>
    </div>
  </div>

  <div class="toolbar-main">
    <div class="toolbar-centerband">
      <div class="desktop-workspace-context" aria-label="Current workspace">
        <span class="workspace-context-part">
          <span class="workspace-context-label">Workspace</span>
          <strong class="workspace-context-name">{{ getFocusedContextTitle() }}</strong>
        </span>
        <span class="workspace-context-badge toolbar-center-summary">{{ getWorkspaceSummary() }}</span>
      </div>
    </div>

    <div class="toolbar-actions">
      <div class="toolbar-action-group toolbar-action-group-primary">
        <div class="split-action" (click)="$event.stopPropagation()">
          <button
            type="button"
            class="toolbar-pill toolbar-pill-primary split-action-main"
            [attr.aria-label]="getTerminalActionLabel()"
            [attr.title]="getTerminalActionLabel() + ' (Ctrl+T)'"
            (click)="createTerminal()"
            [disabled]="!canAddTerminal()"
          >
            <span class="toolbar-icon toolbar-icon-leading" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none">
                <path d="M5.2 6.2h9.6v7.6H5.2z" stroke="currentColor" stroke-width="1.4" />
                <path d="M7.6 9.2h4.8M7.6 11.2h3.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
              </svg>
            </span>
            <span>{{ getTerminalActionLabel() }}</span>
          </button>
          <button
            type="button"
            class="toolbar-pill toolbar-pill-primary split-action-menu"
            aria-label="Choose shell for terminal"
            (click)="toggleShellMenu($event)"
            [disabled]="!canAddTerminal()"
          >
            <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
          @if (shellMenuOpen) {
            <div class="view-menu-dropdown shell-menu-dropdown" role="menu">
              @for (option of getShellOptions(); track option.value) {
                <button
                  type="button"
                  class="view-menu-item"
                  role="menuitem"
                  (click)="createTerminal(option.value)"
                >
                  {{ option.label }}
                </button>
              }
            </div>
          }
        </div>
      </div>
      <button
        type="button"
        class="toolbar-pill muted toolbar-command toolbar-pill-ghost"
        aria-label="Command palette"
        title="Command palette (Ctrl+Shift+P)"
        (click)="openCommandPalette()"
      >
        <span class="toolbar-icon" aria-hidden="true">
          <svg viewBox="0 0 20 20" fill="none">
            <path d="m5 6 3.2 4L5 14M10.5 14H15" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </span>
        <span>Command Palette</span>
        <kbd>Ctrl+Shift+P</kbd>
      </button>
      <div class="toolbar-action-group toolbar-action-group-utility">
        <button type="button" class="toolbar-icon-button toolbar-settings-button" aria-label="Settings" (click)="openSettings()">
          <span class="toolbar-icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" fill="none">
              <path
                d="M10 3.6 10.9 6.2l2.6 1-1.6 2.2 1.6 2.2-2.6 1L10 14.2l-.9-2.6-2.6-1 1.6-2.2-1.6-2.2 2.6-1L10 3.6Z"
                stroke="currentColor"
                stroke-width="1.35"
                stroke-linejoin="round"
              />
              <circle cx="10" cy="9.1" r="2.1" stroke="currentColor" stroke-width="1.35" />
            </svg>
          </span>
        </button>
      </div>
    </div>
  </div>
</header>
